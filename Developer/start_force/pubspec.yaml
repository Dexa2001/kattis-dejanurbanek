name: start_force
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: 0.69.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_ui_auth: ^3.0.1
  firebase_ui_oauth_google: ^2.0.1
  intl: ^0.19.0
  pdf: ^3.11.3
  printing: ^5.14.3
  path_provider: ^2.1.5
  flutter_blue_plus: ^2.3.3
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/login_bg_mobile_9x16.png
    - assets/images/login_bg_web_16x9.png
    - assets/images/login_bg_tablet_4x3.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/swimforce_icon.png"
  remove_alpha_ios: true